spring.application.name=api-gateway
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=localhost

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.server.webflux.routes[0].id=catalogue
spring.cloud.gateway.server.webflux.routes[0].uri=lb://catalogue
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/books/**

spring.cloud.gateway.server.webflux.routes[1].id=orders
spring.cloud.gateway.server.webflux.routes[1].uri=lb://orders
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/orders/**